<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Multi Address Print Pro</title>

<!-- Fonts & Rich Editor CSS -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css" rel="stylesheet">

<style>
:root {
    --bg-primary: #f8fafc;
    --card-bg: #ffffff;
    --text-main: #0f172a;
    --text-muted: #64748b;
    --primary: #4f46e5;
    --primary-hover: #4338ca;
    --success: #10b981;
    --success-hover: #059669;
    --danger: #ef4444;
    --danger-hover: #dc2626;
    --secondary: #64748b;
    --secondary-hover: #475569;
    --border: #e2e8f0;
    --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
    --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.08), 0 2px 4px -2px rgb(0 0 0 / 0.08);
    --shadow-lg: 0 10px 25px -5px rgb(0 0 0 / 0.05), 0 8px 10px -6px rgb(0 0 0 / 0.03);
    --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
    font-family: "Inter", -apple-system, sans-serif;
    background: var(--bg-primary);
    color: var(--text-main);
    margin: 0;
    padding: 0;
}

header {
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(226, 232, 240, 0.8);
    padding: 16px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
}

header h1 {
    font-size: 20px;
    font-weight: 700;
    margin: 0;
    background: linear-gradient(135deg, #6366f1, var(--primary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    display: flex;
    align-items: center;
    gap: 10px;
}

.workspace {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 30px;
    max-width: 1400px;
    margin: 30px auto;
    padding: 0 20px;
}

@media (max-width: 900px) {
    .workspace {
        grid-template-columns: 1fr;
    }
}

/* ---------------- SIDEBAR & CONTROLS ---------------- */

.sidebar {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.card {
    background: var(--card-bg);
    border-radius: 16px;
    border: 1px solid rgba(226, 232, 240, 0.8);
    box-shadow: var(--shadow-lg);
    padding: 24px;
    transition: var(--transition);
}

.card:hover {
    box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.06), 0 8px 10px -6px rgb(0 0 0 / 0.04);
}

.card-title {
    font-size: 16px;
    font-weight: 600;
    margin-top: 0;
    margin-bottom: 18px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    color: var(--text-main);
}

.editor-wrapper {
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: white;
}

.editor {
    height: 150px;
}

/* Custom styles inside Quill editor for editing */
.ql-container.ql-snow {
    border: none !important;
}
.ql-toolbar.ql-snow {
    border: none !important;
    border-bottom: 1px solid var(--border) !important;
    background: #f8fafc;
    padding: 8px 12px !important;
}

.form-group {
    margin-bottom: 16px;
}

.form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.form-control {
    width: 100%;
    box-sizing: border-box;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-family: inherit;
    font-size: 14px;
    color: var(--text-main);
    background: var(--bg-primary);
    transition: var(--transition);
}

.form-control:focus {
    outline: none;
    border-color: var(--primary);
    background: white;
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
}

.input-group {
    display: flex;
    gap: 8px;
}

.input-group .form-control {
    flex-grow: 1;
}

/* ---------------- BUTTONS ---------------- */

.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: var(--transition);
    user-select: none;
    box-shadow: var(--shadow-sm);
}

.btn:active {
    transform: scale(0.96);
}

.btn-primary { 
    background: linear-gradient(135deg, #6366f1, var(--primary)); 
    color: white; 
    box-shadow: 0 4px 10px rgba(79, 70, 229, 0.25);
}
.btn-primary:hover { 
    background: linear-gradient(135deg, #4f46e5, var(--primary-hover));
    box-shadow: 0 6px 14px rgba(79, 70, 229, 0.35);
}

.btn-success { 
    background: linear-gradient(135deg, #34d399, var(--success)); 
    color: white;
    box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2);
}
.btn-success:hover { 
    background: linear-gradient(135deg, #10b981, var(--success-hover));
    box-shadow: 0 6px 14px rgba(16, 185, 129, 0.3);
}

.btn-danger { 
    background: linear-gradient(135deg, #f87171, var(--danger)); 
    color: white;
    box-shadow: 0 4px 10px rgba(239, 68, 68, 0.2);
}
.btn-danger:hover { 
    background: linear-gradient(135deg, #ef4444, var(--danger-hover));
    box-shadow: 0 6px 14px rgba(239, 68, 68, 0.3);
}

.btn-secondary { 
    background: linear-gradient(135deg, #94a3b8, var(--secondary)); 
    color: white;
    box-shadow: 0 4px 10px rgba(100, 116, 139, 0.15);
}
.btn-secondary:hover { 
    background: linear-gradient(135deg, #64748b, var(--secondary-hover));
    box-shadow: 0 6px 14px rgba(100, 116, 139, 0.25);
}

.btn-sm {
    padding: 6px 14px;
    font-size: 12px;
    border-radius: 6px;
}

.btn-full {
    width: 100%;
}

.btn-group-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

/* ---------------- MAIN CONTAINER & CARDS GRID ---------------- */

.main-content {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.content-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.content-header h2 {
    font-size: 18px;
    font-weight: 700;
    margin: 0;
    display: flex;
    align-items: center;
    gap: 8px;
}

.count-badge {
    background: var(--border);
    color: var(--text-main);
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
}

.address-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
}

.card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
}

.card-header h3 {
    font-size: 15px;
    font-weight: 700;
    margin: 0;
}

/* Empty State */
.empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    background: var(--card-bg);
    border-radius: 16px;
    border: 2px dashed var(--border);
    text-align: center;
}

.empty-state p {
    color: var(--text-muted);
    margin-bottom: 20px;
    font-size: 15px;
}

/* ---------------- PRINT LAYOUT ---------------- */

#printArea {
    display: none;
    padding: 10px 20px;
}

.print-block {
    page-break-inside: avoid;
}

.address-box {
    padding: 0px 2px;
    min-height: 130px;
    line-height: 1.35;
}

/* Label spacing */
#printArea .print-label {
    display: block;
    margin-bottom: 1px;
    font-weight: bold;
}

/* Remove Quill spacing */
#printArea .ql-editor {
    padding: 0;
    margin: 0;
}

#printArea .ql-editor p {
    margin: 0 !important;
    line-height: 1.3;
}

#printArea .ql-editor p:first-child {
    margin-top: 0 !important;
}

/* Quill font size fixes */
.ql-size-small { font-size: 9px; }
.ql-size-large { font-size: 16px; }
.ql-size-huge { font-size: 22px; }

/* ---------------- PRINT VIEW ---------------- */

@media print {
    body * {
        visibility: hidden;
    }

    #printArea, #printArea * {
        visibility: visible;
    }

    #printArea {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        display: block !important;
    }

    #printArea .address-box {
        border: none !important;
    }
}
</style>
</head>

<body>

<header>
    <h1>🏷️ Multi Address Print Pro</h1>
    <div style="display: flex; align-items: center; gap: 15px;">
        <span id="saveStatus" style="font-size: 13px; color: var(--success); font-weight: 500; display: flex; align-items: center; gap: 6px; transition: opacity 0.3s;">
            <span style="display: inline-block; width: 8px; height: 8px; background: var(--success); border-radius: 50%;"></span>
            Saved
        </span>
        <button class="btn btn-danger" onclick="confirmClearAll()">🗑️ Clear All</button>
        <button class="btn btn-primary" onclick="printAll()">🖨️ Print All</button>
    </div>
</header>

<div class="workspace">

    <!-- SIDEBAR: CONFIGURATIONS -->
    <div class="sidebar">
        
        <!-- Common From Address Card -->
        <div class="card">
            <div class="card-title">Common From Address</div>
            <div class="editor-wrapper">
                <div id="commonFrom" class="editor"></div>
            </div>
            <div style="margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px;">
                <div class="form-group">
                    <label>Save Current as Template</label>
                    <div class="input-group">
                        <input type="text" id="newTemplateName" class="form-control" placeholder="e.g. Office, Warehouse">
                        <button class="btn btn-success btn-sm" onclick="saveTemplate()">💾 Save</button>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label>Saved Sender Templates</label>
                    <div id="templateList" style="display: flex; flex-direction: column; gap: 8px; max-height: 220px; overflow-y: auto; margin-top: 8px; padding-right: 4px;">
                        <!-- Populate dynamic items here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Print Sizing & Layout Controls -->
        <div class="card">
            <div class="card-title">Print Customization</div>
            <div class="form-group">
                <label for="printFontSize">Print Font Size</label>
                <select id="printFontSize" class="form-control">
                    <option value="12px">Small (12px)</option>
                    <option value="14px">Medium (14px)</option>
                    <option value="16px" selected>Normal (16px)</option>
                    <option value="18px">Large (18px)</option>
                    <option value="20px">Extra Large (20px)</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label for="printCols">Layout Columns</label>
                <select id="printCols" class="form-control">
                    <option value="2" selected>2 Columns (Side-by-Side)</option>
                    <option value="1">1 Column (Stacked)</option>
                </select>
            </div>
        </div>

        <!-- CSV Import Controls -->
        <div class="card">
            <div class="card-title">CSV Import</div>
            <div class="btn-group-row">
                <label class="btn btn-secondary btn-sm" style="cursor: pointer;">
                    📂 Import CSV
                    <input type="file" id="importCSVFile" accept=".csv" style="display: none;" onchange="importCSV(event)">
                </label>
                <button class="btn btn-secondary btn-sm" onclick="downloadSampleCSV()">📄 Download Sample</button>
            </div>
        </div>

    </div>

    <!-- MAIN AREA: TO ADDRESSES -->
    <div class="main-content">
        <div class="content-header">
            <h2>📬 Destination Addresses <span class="count-badge" id="addressCountBadge">0</span></h2>
            <button class="btn btn-success" onclick="addAddress()">➕ Add Address</button>
        </div>


        <div id="addressContainer" class="address-grid"></div>
    </div>

</div>

<!-- HIDDEN PRINT AREA -->
<div id="printArea"></div>

<!-- Quill Library -->
<script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>

<script>
let addressCount = 0;
let editors = [];
let templates = {};
let commonFromEditor;

const toolbarOptions = [
    [{ font: [] }],
    [{ size: ['small', false, 'large', 'huge'] }],
    ['bold', 'italic', 'underline'],
    [{ color: [] }, { background: [] }],
    [{ align: [] }],
    [{ list: 'ordered'}, { list: 'bullet' }],
    ['clean']
];

// Initialize on window load
window.addEventListener('DOMContentLoaded', () => {
    // 1. Initialize Common From Editor
    commonFromEditor = new Quill('#commonFrom', {
        theme: 'snow',
        modules: { toolbar: toolbarOptions }
    });

    // Save common from changes to LocalStorage
    commonFromEditor.on('text-change', () => {
        saveToLocalStorage();
    });

    // 2. Load data from LocalStorage
    loadFromLocalStorage();
});

// Update Badge count
function updateUIState() {
    const badge = document.getElementById("addressCountBadge");
    badge.innerText = editors.length;
}

// Add Address Card
function addAddress(initialContent = '') {
    addressCount++;

    const html = `
        <div class="card" id="card_${addressCount}">
            <div class="card-header">
                <h3>Destination Address</h3>
                <button class="btn btn-danger btn-sm" style="padding: 4px 8px;" onclick="removeAddress(${addressCount})">❌ Remove</button>
            </div>
            <div class="editor-wrapper">
                <div id="to_${addressCount}" class="editor"></div>
            </div>
        </div>
    `;

    document.getElementById("addressContainer")
        .insertAdjacentHTML("beforeend", html);

    const toEditor = new Quill('#to_' + addressCount, {
        theme: 'snow',
        modules: { toolbar: toolbarOptions }
    });

    if (initialContent) {
        toEditor.root.innerHTML = initialContent;
    }

    toEditor.on('text-change', () => {
        saveToLocalStorage();
    });

    editors.push({ id: addressCount, editor: toEditor });
    updateUIState();
    saveToLocalStorage();
}

// Remove Address Card
function removeAddress(id) {
    const cardEl = document.getElementById("card_" + id);
    if (cardEl) {
        cardEl.remove();
    }
    editors = editors.filter(item => item.id !== id);
    updateUIState();
    saveToLocalStorage();
}

// Confirm and Clear All
function confirmClearAll() {
    if (editors.length === 0) return;
    if (confirm("Are you sure you want to clear all destination addresses?")) {
        editors.forEach(item => {
            const cardEl = document.getElementById("card_" + item.id);
            if (cardEl) cardEl.remove();
        });
        editors = [];
        updateUIState();
        saveToLocalStorage();
    }
}

// Clean HTML tags
function cleanHTML(html) {
    return html.replace(/^(<p><br><\/p>)+/, "");
}

// Save all state to LocalStorage
let saveTimeout = null;
function saveToLocalStorage() {
    const saveStatus = document.getElementById("saveStatus");
    if (saveStatus) {
        saveStatus.innerHTML = '<span style="display: inline-block; width: 8px; height: 8px; background: #eab308; border-radius: 50%;"></span> Saving...';
        saveStatus.style.color = '#eab308';
    }

    const data = {
        commonFrom: commonFromEditor.root.innerHTML,
        addresses: editors.map(item => ({
            id: item.id,
            toHTML: item.editor.root.innerHTML
        })),
        templates: templates
    };
    localStorage.setItem('address_print_data_v2', JSON.stringify(data));

    // Debounce/delay changing visual status to green
    if (saveTimeout) clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => {
        if (saveStatus) {
            saveStatus.innerHTML = '<span style="display: inline-block; width: 8px; height: 8px; background: var(--success); border-radius: 50%;"></span> Saved';
            saveStatus.style.color = 'var(--success)';
        }
    }, 450);
}

// Load all state from LocalStorage
function loadFromLocalStorage() {
    const raw = localStorage.getItem('address_print_data_v2');
    if (raw) {
        try {
            const data = JSON.parse(raw);
            
            // Restore Common From Address
            if (data.commonFrom) {
                commonFromEditor.root.innerHTML = data.commonFrom;
            }

            // Restore Templates
            if (data.templates) {
                templates = data.templates;
                updateTemplateList();
            }

            // Restore Addresses
            if (data.addresses && data.addresses.length > 0) {
                data.addresses.forEach(addr => {
                    addAddress(addr.toHTML);
                });
            } else {
                updateUIState();
            }
        } catch (e) {
            console.error("Error parsing local storage address data", e);
            updateUIState();
        }
    } else {
        updateUIState();
    }
}

// --- TEMPLATES LOGIC ---

function saveTemplate() {
    const nameInput = document.getElementById("newTemplateName");
    const name = nameInput.value.trim();
    if (!name) {
        alert("Please enter a template name.");
        return;
    }

    if (templates[name]) {
        if (!confirm(`A template named "${name}" already exists. Overwrite it?`)) {
            return;
        }
    }

    const currentFromHTML = commonFromEditor.root.innerHTML;
    templates[name] = currentFromHTML;
    nameInput.value = "";
    
    updateTemplateList();
    saveToLocalStorage();
}

function loadTemplate(name) {
    if (templates[name]) {
        commonFromEditor.root.innerHTML = templates[name];
        saveToLocalStorage();
    }
}

function updateTemplate(name) {
    if (confirm(`Overwrite template "${name}" with the current editor content?`)) {
        templates[name] = commonFromEditor.root.innerHTML;
        saveToLocalStorage();
        alert(`Template "${name}" updated!`);
    }
}

function renameTemplate(oldName) {
    const newName = prompt(`Enter new name for template "${oldName}":`, oldName);
    if (newName === null) return; // User cancelled
    
    const trimmed = newName.trim();
    if (!trimmed) {
        alert("Template name cannot be empty.");
        return;
    }
    
    if (trimmed === oldName) return;
    
    if (templates[trimmed]) {
        alert(`A template named "${trimmed}" already exists.`);
        return;
    }
    
    templates[trimmed] = templates[oldName];
    delete templates[oldName];
    
    updateTemplateList();
    saveToLocalStorage();
}

function deleteTemplate(name) {
    if (confirm(`Are you sure you want to delete template "${name}"?`)) {
        delete templates[name];
        updateTemplateList();
        saveToLocalStorage();
    }
}

function updateTemplateList() {
    const container = document.getElementById("templateList");
    container.innerHTML = "";
    
    const sortedNames = Object.keys(templates).sort();
    if (sortedNames.length === 0) {
        container.innerHTML = `<div style="font-size: 13px; color: var(--text-muted); font-style: italic; text-align: center; padding: 10px;">No templates saved yet.</div>`;
        return;
    }

    sortedNames.forEach(name => {
        const itemHTML = `
            <div class="template-item" style="display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 6px; gap: 10px;">
                <span class="template-name" style="font-size: 13px; font-weight: 500; cursor: pointer; flex-grow: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--primary);" onclick="loadTemplate('${name}')" title="Click to load template">${name}</span>
                <div style="display: flex; gap: 4px; flex-shrink: 0;">
                    <button class="btn btn-secondary btn-sm" style="padding: 2px 6px; font-size: 11px;" onclick="updateTemplate('${name}')" title="Save current editor content to this template">💾 Save Over</button>
                    <button class="btn btn-secondary btn-sm" style="padding: 2px 6px; font-size: 11px;" onclick="renameTemplate('${name}')" title="Rename template">✏️</button>
                    <button class="btn btn-danger btn-sm" style="padding: 2px 6px; font-size: 11px;" onclick="deleteTemplate('${name}')" title="Delete template">🗑️</button>
                </div>
            </div>
        `;
        container.insertAdjacentHTML("beforeend", itemHTML);
    });
}

// --- CSV IMPORT & PARSING LOGIC ---

function parseCSV(text) {
    let lines = [];
    let row = [""];
    let inQuotes = false;

    for (let i = 0; i < text.length; i++) {
        let c = text[i];
        let next = text[i+1];
        if (c === '"') {
            if (inQuotes && next === '"') {
                row[row.length - 1] += '"';
                i++;
            } else {
                inQuotes = !inQuotes;
            }
        } else if (c === ',' && !inQuotes) {
            row.push("");
        } else if ((c === '\r' || c === '\n') && !inQuotes) {
            if (c === '\r' && next === '\n') {
                i++;
            }
            lines.push(row);
            row = [""];
        } else {
            row[row.length - 1] += c;
        }
    }
    if (row.length > 1 || row[0] !== "") {
        lines.push(row);
    }
    return lines;
}

function importCSV(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const text = e.target.result;
            const rows = parseCSV(text);
            
            if (rows.length < 2) {
                alert("The CSV file seems to be empty or invalid.");
                return;
            }

            // Find header index for "address"
            const headers = rows[0].map(h => h.trim().toLowerCase());
            const addressColIdx = headers.indexOf("address");
            if (addressColIdx === -1) {
                alert("Could not find an 'address' column in the CSV. Please ensure the first row is a header containing 'address'.");
                return;
            }

            // Filter out empty rows, and map to content
            const newAddresses = [];
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (row.length > addressColIdx) {
                    const value = row[addressColIdx].trim();
                    if (value) {
                        // Replace standard newlines with HTML paragraphs for Quill
                        const htmlContent = value.split(/\r?\n/).map(line => `<p>${line}</p>`).join("");
                        newAddresses.push(htmlContent);
                    }
                }
            }

            if (newAddresses.length === 0) {
                alert("No valid addresses found in the CSV file.");
                return;
            }

            if (confirm(`Found ${newAddresses.length} addresses. Do you want to add them to the list?`)) {
                newAddresses.forEach(html => {
                    addAddress(html);
                });
                alert(`${newAddresses.length} addresses imported successfully!`);
            }

        } catch (err) {
            alert("Failed to parse CSV file. Please ensure it is a valid CSV format.");
            console.error(err);
        }
    };
    reader.readAsText(file);
    // Reset file input
    event.target.value = "";
}

function downloadSampleCSV() {
    const csvContent = `"address"\n"John Doe\n123 Main Street\nApartment 4B\nNew York, NY 10001"\n"Jane Smith\n456 Elm Court\nSuite 12\nLos Angeles, CA 90001"`;
    
    // Add UTF-8 BOM to ensure Excel opens it correctly with newlines and formatting
    const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const downloadAnchor = document.createElement('a');
    downloadAnchor.setAttribute("href", url);
    downloadAnchor.setAttribute("download", "address_sample.csv");
    document.body.appendChild(downloadAnchor);
    downloadAnchor.click();
    downloadAnchor.remove();
}

// --- PRINT ALL LOGIC ---

function printAll() {
    let printHTML = "";
    const fromHTML = cleanHTML(commonFromEditor.root.innerHTML);
    const fontSize = document.getElementById("printFontSize").value;
    const printCols = document.getElementById("printCols").value;

    // Build print style overrides dynamically based on configuration
    const styleOverride = `
        <style>
            #printArea {
                font-size: ${fontSize} !important;
            }
            #printArea .address-box {
                font-size: ${fontSize} !important;
                width: ${printCols === "2" ? "46%" : "100%"};
                margin-bottom: ${printCols === "1" ? "20px" : "0"};
            }
            #printArea .print-block {
                display: flex;
                flex-direction: ${printCols === "2" ? "row" : "column"};
                justify-content: space-between;
                margin-bottom: 30px;
                page-break-inside: avoid;
            }
        </style>
    `;

    editors.forEach((item) => {
        const toHTML = cleanHTML(item.editor.root.innerHTML);

        printHTML += `
            <div class="print-block">
                <div class="address-box">
                    <span class="print-label">From:</span>
                    <div class="ql-editor">${fromHTML}</div>
                </div>
                <div class="address-box">
                    <span class="print-label">To:</span>
                    <div class="ql-editor">${toHTML}</div>
                </div>
            </div>
        `;
    });

    const printArea = document.getElementById("printArea");
    printArea.innerHTML = styleOverride + printHTML;
    printArea.style.display = "block";

    window.print();

    printArea.style.display = "none";
}
</script>
